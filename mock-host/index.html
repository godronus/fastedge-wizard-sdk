<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FastEdge Mock Host</title>
<link rel="stylesheet" href="/wizard-host/style.css">
</head>
<body>

<div id="wiz-wrap">
    <iframe id="wiz" sandbox="allow-scripts"></iframe>
    <div id="modal-back" hidden>
        <div id="modal">
            <div id="modal-head"></div>
            <div id="modal-body"></div>
            <div id="modal-foot"></div>
        </div>
    </div>
</div>

<aside id="panel">
    <div id="rh"></div>
    <div id="ph">
        <strong>Mock Host</strong>
        <span id="st">connecting…</span>
    </div>
    <div id="tr">
        Theme: <button id="tb"></button>
    </div>
    <div class="sh">Intent Log</div>
    <div id="lw"><div id="lg"></div></div>
</aside>

<script type="module" src="/wizard-host/host.js"></script>
</body>
</html>
